name: Wire Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  C3_ENV: ci

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache Clojure Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-deps-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: 'latest'

      - name: Run Clojure Tests
        run: clojure -M:test:spec-ci

      - name: Run wire-core ClojureScript Tests
        run: clojure -M:test:cljs once

      - name: Run wire ClojureScript Tests
        run: clojure -M:test:react:cljs once
